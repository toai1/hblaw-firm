services:
  - type: web
    name: hblaw-firm
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist-server/server.js
    envVars:
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_TO
        sync: false

build:
  builder: nixpacks
  buildpacks: []
  config:
    NIXPACKS_PKGS: []
    NIXPACKS_INSTALL_CMD: npm install
    NIXPACKS_BUILD_CMD: npm run build
run:
  startCommand: npm start
  environmentVariableGroups:
    - name: mail
      variables:
        - MAIL_USER
        - MAIL_PASS
        - MAIL_TO
